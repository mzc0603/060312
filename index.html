    <script>
        const PALETTES = [

            },
            {

                colors: ["#2C1810", "#6B4423", "#D4A574", "#E8C89E", "#FCF6F0", "#1A1A2E"]

            {

                colors: ["#FF00FF", "#00FFFF", "#FF0080", "#8000FF", "#00FF80", "#FFFF00"]

        class ColorPicker {
            constructor() {
                this.currentColor = { r: 99, g: 102, b: 241 };
                this.isDragging = false;
                this.isScreenPicking = false;
                this.favorites = this.loadFavorites();
                this.init();
            }

            init() {
                this.bindElements();
                this.bindEvents();
                this.renderPalettes();
                this.renderFavorites();
                this.updateColorDisplay();
            }

            bindElements() {
                this.previewArea = document.getElementById('previewArea');
                this.previewCanvas = document.getElementById('previewCanvas');
                this.previewCtx = this.previewCanvas.getContext('2d', { willReadFrequently: true });
                this.fileInput = document.getElementById('fileInput');
                this.colorSwatch = document.getElementById('colorSwatch');
                this.hexInput = document.getElementById('hexInput');
                this.rgbInput = document.getElementById('rgbInput');
                this.hslInput = document.getElementById('hslInput');
                this.redSlider = document.getElementById('redSlider');
                this.greenSlider = document.getElementById('greenSlider');
                this.blueSlider = document.getElementById('blueSlider');
                this.redValue = document.getElementById('redValue');
                this.greenValue = document.getElementById('greenValue');
                this.blueValue = document.getElementById('blueValue');
                this.magnifier = document.getElementById('magnifier');
                this.magnifierCanvas = document.getElementById('magnifierCanvas');
                this.magnifierCtx = this.magnifierCanvas.getContext('2d');
                this.magnifierColor = document.getElementById('magnifierColor');
                this.paletteGrid = document.getElementById('paletteGrid');
                this.favoritesGrid = document.getElementById('favoritesGrid');
                this.favoritesCount = document.getElementById('favoritesCount');
                this.emptyFavorites = document.getElementById('emptyFavorites');
                this.toastContainer = document.getElementById('toastContainer');
                this.uploadBtn = document.getElementById('uploadBtn');
                this.screenPickerBtn = document.getElementById('screenPickerBtn');
                this.favoriteBtn = document.getElementById('favoriteBtn');
                this.clearFavoritesBtn = document.getElementById('clearFavoritesBtn');
            }

            bindEvents() {
                this.previewArea.addEventListener('click', (e) => {
                    if (this.previewArea.classList.contains('has-image')) {
                        this.pickColorFromCanvas(e);
                    } else {
                        this.fileInput.click();
                    }
                });

                this.previewArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    this.previewArea.style.borderColor = '#6366f1';
                });

                this.previewArea.addEventListener('dragleave', () => {
                    this.previewArea.style.borderColor = '';
                });

                this.previewArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.previewArea.style.borderColor = '';
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        this.loadImage(file);
                    }
                });

                this.previewArea.addEventListener('mousemove', (e) => {
                    if (this.previewArea.classList.contains('has-image') && !this.isScreenPicking) {
                        this.showMagnifier(e);
                    }
                });

                this.previewArea.addEventListener('mouseleave', () => {
                    this.magnifier.classList.remove('active');
                });

                this.fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        this.loadImage(file);
                    }
                });

                this.uploadBtn.addEventListener('click', () => {
                    this.fileInput.click();
                });

                this.redSlider.addEventListener('input', () => this.handleSliderChange());
                this.greenSlider.addEventListener('input', () => this.handleSliderChange());
                this.blueSlider.addEventListener('input', () => this.handleSliderChange());

                document.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', () => this.copyColor(btn.dataset.copy));
                });

                this.favoriteBtn.addEventListener('click', () => this.toggleFavorite());
                this.clearFavoritesBtn.addEventListener('click', () => this.clearFavorites());

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'u' || e.key === 'U') {
                        this.fileInput.click();
                    }
                });
            }

            loadImage(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const maxWidth = 600;
                        const maxHeight = 450;
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = (maxHeight / height) * width;
                            height = maxHeight;
                        }

                        this.previewCanvas.width = width;
                        this.previewCanvas.height = height;
                        this.previewCtx.drawImage(img, 0, 0, width, height);
                        this.previewArea.classList.add('has-image');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            pickColorFromCanvas(e) {
                const rect = this.previewCanvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) * (this.previewCanvas.width / rect.width));
                const y = Math.floor((e.clientY - rect.top) * (this.previewCanvas.height / rect.height));
                const imageData = this.previewCtx.getImageData(x, y, 1, 1).data;
                this.setColor(imageData[0], imageData[1], imageData[2]);
            }

            showMagnifier(e) {
                const rect = this.previewCanvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) * (this.previewCanvas.width / rect.width));
                const y = Math.floor((e.clientY - rect.top) * (this.previewCanvas.height / rect.height));

                this.magnifier.style.left = (e.clientX + 20) + 'px';
                this.magnifier.style.top = (e.clientY - 80) + 'px';
                this.magnifier.classList.add('active');

                const sourceX = Math.max(0, x - 7);
                const sourceY = Math.max(0, y - 7);
                const sourceSize = 15;

                this.magnifierCtx.imageSmoothingEnabled = false;
                this.magnifierCtx.clearRect(0, 0, 150, 150);
                this.magnifierCtx.drawImage(
                    this.previewCanvas,
                    sourceX, sourceY, sourceSize, sourceSize,
                    0, 0, 150, 150
                );

                const imageData = this.previewCtx.getImageData(x, y, 1, 1).data;
                const hex = this.rgbToHex(imageData[0], imageData[1], imageData[2]);
                this.magnifierColor.textContent = hex;
                this.magnifierColor.style.background = 'rgba(0,0,0,0.8)';
            }

            handleSliderChange() {
                const r = parseInt(this.redSlider.value);
                const g = parseInt(this.greenSlider.value);
                const b = parseInt(this.blueSlider.value);
                this.setColor(r, g, b);
            }

            setColor(r, g, b) {
                this.currentColor = { r, g, b };
                this.updateColorDisplay();
            }

            updateColorDisplay() {
                const { r, g, b } = this.currentColor;
                const hex = this.rgbToHex(r, g, b);
                const hsl = this.rgbToHsl(r, g, b);

                this.colorSwatch.style.background = hex;
                this.hexInput.value = hex;
                this.rgbInput.value = `rgb(${r}, ${g}, ${b})`;
                this.hslInput.value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
                this.redSlider.value = r;
                this.greenSlider.value = g;
                this.blueSlider.value = b;
                this.redValue.textContent = r;
                this.greenValue.textContent = g;
                this.blueValue.textContent = b;
            }

            rgbToHex(r, g, b) {
                return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
            }

            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            }

            rgbToHsl(r, g, b) {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0;
                } else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                        case g: h = ((b - r) / d + 2) / 6; break;
                        case b: h = ((r - g) / d + 4) / 6; break;
                    }
                }
                return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
            }

            async copyColor(type) {
                let text;
                switch(type) {
                    case 'hex': text = this.hexInput.value; break;
                    case 'rgb': text = this.rgbInput.value; break;
                    case 'hsl': text = this.hslInput.value; break;
                }
                try {
                    await navigator.clipboard.writeText(text);
                    this.showToast('已复制: ' + text, 'success');
                } catch (err) {
                    this.showToast('复制失败', 'error');
                }
            }

            async startScreenPicker() {
                this.isScreenPicking = true;

                const overlay = document.createElement('div');
                overlay.className = 'screen-picker-overlay';
                document.body.appendChild(overlay);

                const info = document.createElement('div');
                info.className = 'screen-picker-info';
                info.innerHTML = `
                    <div class="screen-picker-preview" id="screenPickerPreview"></div>
                    <span id="screenPickerHex">#000000</span>
                    <span class="screen-picker-hint">点击任意位置取色 · ESC退出</span>
                `;
                document.body.appendChild(info);

                const crosshair = document.createElement('div');
                crosshair.className = 'screen-picker-crosshair';
                document.body.appendChild(crosshair);

                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { 
                            displaySurface: 'monitor',
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        } 
                    });
                    
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;pointer-events:none;';
                    document.body.appendChild(video);
                    await video.play();

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d', { willReadFrequently: true });

                    overlay.addEventListener('mousemove', (e) => {
                        crosshair.style.left = e.clientX + 'px';
                        crosshair.style.top = e.clientY + 'px';

                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0);

                        const x = Math.floor(e.clientX * (canvas.width / window.innerWidth));
                        const y = Math.floor(e.clientY * (canvas.height / window.innerHeight));
                        const imageData = ctx.getImageData(x, y, 1, 1).data;
                        const hex = this.rgbToHex(imageData[0], imageData[1], imageData[2]);

                        document.getElementById('screenPickerHex').textContent = hex;
                        document.getElementById('screenPickerPreview').style.background = hex;
                    });

                    overlay.addEventListener('click', (e) => {
                        crosshair.style.left = e.clientX + 'px';
                        crosshair.style.top = e.clientY + 'px';

                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0);

                        const x = Math.floor(e.clientX * (canvas.width / window.innerWidth));
                        const y = Math.floor(e.clientY * (canvas.height / window.innerHeight));
                        const imageData = ctx.getImageData(x, y, 1, 1).data;

                        stream.getTracks().forEach(track => track.stop());
                        document.body.removeChild(video);
                        document.body.removeChild(overlay);
                        document.body.removeChild(info);
                        document.body.removeChild(crosshair);
                        this.isScreenPicking = false;

                        this.setColor(imageData[0], imageData[1], imageData[2]);
                        this.showToast('已取色: ' + this.rgbToHex(imageData[0], imageData[1], imageData[2]), 'success');
                    });

                    overlay.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') {
                            stream.getTracks().forEach(track => track.stop());
                            document.body.removeChild(video);
                            document.body.removeChild(overlay);
                            document.body.removeChild(info);
                            document.body.removeChild(crosshair);
                            this.isScreenPicking = false;
                        }
                    });

                } catch (err) {
                    console.error('Screen picker error:', err);
                    document.body.removeChild(overlay);
                    document.body.removeChild(info);
                    if (crosshair.parentNode) document.body.removeChild(crosshair);
                    this.isScreenPicking = false;
                    this.showToast('屏幕取色失败，请重试', 'error');
                }
            }

            renderPalettes() {
                this.paletteGrid.innerHTML = PALETTES.map(palette => `
                    <div class="palette-card" data-palette="${palette.name}">
                        <div class="palette-name">${palette.name}</div>
                        <div class="palette-colors">
                            ${palette.colors.map(c => `
                                <div class="palette-color" style="background: ${c}" data-color="${c}" title="${c}"></div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                this.paletteGrid.querySelectorAll('.palette-color').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const color = el.dataset.color;
                        const rgb = this.hexToRgb(color);
                        if (rgb) {
                            this.setColor(rgb.r, rgb.g, rgb.b);
                            this.showToast('已取色: ' + color, 'success');
                        }
                    });
                });

                this.paletteGrid.querySelectorAll('.palette-card').forEach(el => {
                    el.addEventListener('dblclick', () => {
                        const paletteName = el.dataset.palette;
                        const palette = PALETTES.find(p => p.name === paletteName);
                        if (palette) {
                            const colorString = palette.colors.join(', ');
                            navigator.clipboard.writeText(colorString);
                            this.showToast('已复制配色: ' + paletteName, 'success');
                        }
                    });
                });
            }

            loadFavorites() {
                try {
                    return JSON.parse(localStorage.getItem('colorPickerFavorites')) || [];
                } catch {
                    return [];
                }
            }

            saveFavorites() {
                localStorage.setItem('colorPickerFavorites', JSON.stringify(this.favorites));
            }

            renderFavorites() {
                this.favoritesCount.textContent = `${this.favorites.length} / 20`;

                if (this.favorites.length === 0) {
                    this.emptyFavorites.style.display = 'block';
                    const items = this.favoritesGrid.querySelectorAll('.favorite-item');
                    items.forEach(item => item.remove());
                    return;
                }

                this.emptyFavorites.style.display = 'none';

                const existingItems = this.favoritesGrid.querySelectorAll('.favorite-item');
                existingItems.forEach(item => item.remove());

                this.favorites.forEach((color, index) => {
                    const item = document.createElement('div');
                    item.className = 'favorite-item';
                    item.style.background = color;
                    item.dataset.hex = color;
                    item.title = color;

                    item.addEventListener('click', () => {
                        navigator.clipboard.writeText(color);
                        this.showToast('已复制: ' + color, 'success');
                    });

                    item.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        this.removeFavorite(index);
                    });

                    this.favoritesGrid.appendChild(item);
                });
            }

            toggleFavorite() {
                const hex = this.hexInput.value;
                const index = this.favorites.indexOf(hex);

                if (index > -1) {
                    this.removeFavorite(index);
                } else {
                    if (this.favorites.length >= 20) {
                        this.showToast('最多收藏20个颜色', 'error');
                        return;
                    }
                    this.favorites.unshift(hex);
                    this.saveFavorites();
                    this.renderFavorites();
                    this.showToast('已添加到收藏', 'success');
                }
            }

            removeFavorite(index) {
                this.favorites.splice(index, 1);
                this.saveFavorites();
                this.renderFavorites();
                this.showToast('已移除收藏', 'success');
            }

            clearFavorites() {
                if (this.favorites.length === 0) return;
                this.favorites = [];
                this.saveFavorites();
                this.renderFavorites();
                this.showToast('已清空收藏', 'success');
            }

            showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                this.toastContainer.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'toastOut 0.3s ease-out forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const picker = new ColorPicker();

            document.getElementById('screenPickerBtn').addEventListener('click', () => {
                picker.startScreenPicker();
            });
        });
    </script>
